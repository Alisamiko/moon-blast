<title>Moon 🌑 Blast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;outline:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;overscroll-behavior:none}
body{background:linear-gradient(180deg,#05020f 0%,#0d0620 10%,#1a0a3e 25%,#2d1b5e 45%,#1a0a3e 65%,#0d0620 85%,#05020f 100%);display:flex;flex-direction:column;align-items:center;position:relative}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#game-container{position:relative;z-index:1;width:100%;max-width:500px;height:100%;max-height:100vh;display:flex;flex-direction:column;align-items:center;padding:6px;overflow:hidden}
#top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:6px 10px;margin-bottom:4px;background:rgba(255,255,255,0.08);border-radius:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.left-group{display:flex;align-items:center;gap:8px}
#score-area{text-align:center}
#score-display{color:#f0e6ff;font-size:1.2em;font-weight:bold;text-shadow:0 0 10px rgba(200,150,255,0.5)}
#best-score{color:#c9b1ff;font-size:0.65em;opacity:0.7;margin-top:1px}
#combo-display{color:#ffd4e8;font-size:0.9em;font-weight:bold;opacity:0;transition:opacity 0.3s;text-shadow:0 0 10px rgba(255,180,220,0.5);text-align:center}
#combo-display.active{opacity:1}
.btn-group{display:flex;gap:8px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,rgba(200,220,255,0.15),rgba(180,200,255,0.08));cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(180,200,255,0.15),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1);touch-action:manipulation}
.ctrl-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);border-radius:50% 50% 0 0;pointer-events:none}
.ctrl-btn::after{content:'';position:absolute;top:3px;left:25%;width:50%;height:30%;background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent);border-radius:50%;filter:blur(2px);pointer-events:none}
.ctrl-btn:active{transform:scale(0.92);box-shadow:0 1px 6px rgba(180,200,255,0.1),inset 0 1px 0 rgba(255,255,255,0.15)}
.ctrl-btn svg{width:20px;height:20px;position:relative;z-index:1;filter:drop-shadow(0 1px 2px rgba(180,200,255,0.3))}
.ctrl-btn.muted svg .strike-line{opacity:1}
.ctrl-btn.muted svg .icon-path{opacity:0.35}
#board-wrapper{position:relative;margin:2px 0;flex-shrink:0}
#board{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:5px;background:rgba(0,0,0,0.35);border-radius:12px;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08)}
.cell{width:clamp(36px,10.5vw,48px);height:clamp(36px,10.5vw,48px);background:rgba(255,255,255,0.04);border-radius:7px;transition:background 0.1s,transform 0.1s;position:relative;overflow:hidden}
.cell.filled{box-shadow:inset 0 -3px 0 rgba(0,0,0,0.12),inset 0 2px 0 rgba(255,255,255,0.2),0 2px 6px rgba(0,0,0,0.2)}
.cell .cell-star{position:absolute;border-radius:50%;background:white;pointer-events:none;animation:twinkle 2s ease-in-out infinite}
.cell.preview-valid{background:rgba(140,220,160,0.3)!important;box-shadow:0 0 10px rgba(140,220,160,0.3)}
.cell.preview-invalid{background:rgba(255,100,100,0.25)!important;box-shadow:0 0 10px rgba(255,100,100,0.2)}
.cell.clearing{animation:cellClear 0.4s ease-out forwards}
@keyframes cellClear{0%{transform:scale(1);opacity:1}30%{transform:scale(1.15);opacity:0.9;box-shadow:0 0 15px rgba(255,255,255,0.6)}100%{transform:scale(0);opacity:0}}
.cell.placing{animation:cellPlace 0.15s ease-out}
@keyframes cellPlace{0%{transform:scale(0.6);opacity:0.6}100%{transform:scale(1);opacity:1}}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.7}}
#pieces-panel{width:100%;display:flex;justify-content:space-around;align-items:center;padding:6px 4px;background:rgba(0,0,0,0.15);border-radius:12px 12px 0 0;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);min-height:85px;flex-shrink:0;margin-top:2px}
.piece-container{display:flex;align-items:center;justify-content:center;padding:6px;cursor:grab;transition:transform 0.2s,opacity 0.2s;border-radius:10px;min-width:55px;min-height:55px}
.piece-container:active{cursor:grabbing}
.piece-container.used{opacity:0;pointer-events:none;transform:scale(0)}
.piece-grid{display:grid;gap:2px}
.piece-cell{width:clamp(14px,4vw,20px);height:clamp(14px,4vw,20px);border-radius:4px;position:relative;overflow:hidden}
.piece-cell.filled{box-shadow:inset 0 -2px 0 rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.2)}
.piece-cell.filled .cell-pattern{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0.6}
.piece-cell.filled .star-dot{position:absolute;border-radius:50%;background:white;pointer-events:none;animation:twinkle 2s ease-in-out infinite}
.piece-cell.empty{background:transparent}
#drag-piece{position:fixed;pointer-events:none;z-index:1000;opacity:0.92;display:none}
#drag-piece .piece-grid{gap:2px}
#drag-piece .piece-cell{border-radius:6px}
#game-over{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:2000;flex-direction:column}
#game-over.show{display:flex}
#game-over-content{background:linear-gradient(135deg,rgba(60,30,90,0.95),rgba(40,20,70,0.95));padding:28px;border-radius:22px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);max-width:90%;position:relative;overflow:hidden}
#game-over h2{color:#f0e6ff;font-size:1.8em;margin-bottom:6px;text-shadow:0 0 20px rgba(200,150,255,0.5)}
#final-score{color:#ffd4e8;font-size:1.4em;margin-bottom:4px}
#best-score-final{color:#c9b1ff;font-size:0.9em;margin-bottom:16px;opacity:0.8}
#restart-btn{padding:12px 32px;font-size:1.1em;border:none;border-radius:10px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:white;cursor:pointer;font-weight:bold;box-shadow:0 4px 16px rgba(124,58,237,0.4);transition:transform 0.2s;display:block;margin:0 auto}
#restart-btn:active{transform:scale(0.95)}
#continue-btn{padding:12px 32px;font-size:1.1em;border:none;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;cursor:pointer;font-weight:bold;box-shadow:0 4px 16px rgba(217,119,6,0.4);transition:transform 0.2s;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
#continue-btn:active{transform:scale(0.95)}
#continue-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
#continue-info{color:#c9b1ff;font-size:0.8em;margin-bottom:8px;opacity:0.7}
#butterfly-crack{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:80px;height:80px;opacity:0;pointer-events:none}
#butterfly-crack.show{opacity:1;animation:butterflyCrack 2s ease-out forwards}
@keyframes butterflyCrack{0%{opacity:0;transform:translateX(-50%) scale(0.3) rotate(0deg)}30%{opacity:1;transform:translateX(-50%) scale(1.2) rotate(10deg)}60%{transform:translateX(-50%) scale(1) rotate(-5deg)}100%{opacity:0.6;transform:translateX(-50%) scale(0.8) rotate(0deg)}}
.particle{position:fixed;pointer-events:none;z-index:1500;border-radius:50%}
.crystal-shard{position:fixed;pointer-events:none;z-index:1500;clip-path:polygon(50% 0%,100% 40%,80% 100%,20% 100%,0% 40%)}
.combo-text{position:fixed;pointer-events:none;z-index:1500;color:#ffd4e8;font-size:1.8em;font-weight:bold;text-shadow:0 0 20px rgba(255,180,220,0.8),0 0 40px rgba(255,150,200,0.4);animation:comboFloat 1.2s ease-out forwards}
@keyframes comboFloat{0%{transform:translateY(0) scale(0.3);opacity:0}15%{transform:translateY(-5px) scale(1.3);opacity:1}100%{transform:translateY(-80px) scale(0.9);opacity:0}}
.score-popup{position:fixed;pointer-events:none;z-index:1500;color:#f0e6ff;font-size:1.2em;font-weight:bold;text-shadow:0 0 10px rgba(200,150,255,0.6);animation:scoreFloat 0.9s ease-out forwards}
@keyframes scoreFloat{0%{transform:translateY(0) scale(0.8);opacity:0}20%{transform:translateY(-5px) scale(1.1);opacity:1}100%{transform:translateY(-50px) scale(1);opacity:0}}
.flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1400;background:radial-gradient(circle,rgba(255,255,255,0.25),transparent 70%);animation:flash 0.3s ease-out forwards}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
.music-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:3000;display:none;align-items:center;justify-content:center}
.music-menu-overlay.show{display:flex}
.music-menu-overlay.closing{animation:menuFadeOut 0.2s ease-out forwards}
.music-menu{background:linear-gradient(135deg,rgba(40,20,70,0.97),rgba(30,15,55,0.97));border-radius:20px;width:90%;max-width:320px;max-height:80vh;box-shadow:0 16px 48px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);animation:slideUp 0.25s ease-out;display:flex;flex-direction:column;overflow:hidden}
.music-menu-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;flex:1;min-height:0;touch-action:pan-y!important;-webkit-touch-callout:auto!important}
.music-menu-scroll::-webkit-scrollbar{width:6px}
.music-menu-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:3px}
.music-menu-scroll::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.4);border-radius:3px}
.music-menu-scroll::-webkit-scrollbar-thumb:hover{background:rgba(168,85,247,0.6)}
.music-menu,.music-menu-overlay,.music-menu-scroll,.music-menu-tracks,.music-menu-custom-tracks{touch-action:pan-y!important;-webkit-overflow-scrolling:touch}
.music-menu.closing{animation:slideDown 0.2s ease-out forwards}
@keyframes slideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes slideDown{0%{transform:translateY(0);opacity:1}100%{transform:translateY(30px);opacity:0}}
@keyframes menuFadeOut{0%{opacity:1}100%{opacity:0}}
.music-menu-header{display:flex;justify-content:center;align-items:center;margin-bottom:14px;position:relative;padding-top:16px}
.music-menu-header span{flex:1;text-align:center}
.music-menu-close{position:absolute;right:0}
.music-menu-header span{color:#f0e6ff;font-size:1.1em;font-weight:bold}
.music-menu-close{background:none;border:none;color:#c9b1ff;font-size:1.6em;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.2s;line-height:1}
.music-menu-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.music-menu-toggle{display:flex;align-items:center;justify-content:center;padding:10px;margin-bottom:12px;background:rgba(255,255,255,0.06);border-radius:12px;cursor:pointer;transition:all 0.2s}
.music-menu-toggle:hover{background:rgba(255,255,255,0.1)}
.music-menu-toggle span{color:#f0e6ff;font-size:0.95em}
.music-menu-tracks{display:flex;flex-direction:column;gap:6px}
.music-track{display:flex;align-items:center;padding:10px 14px;border-radius:12px;cursor:pointer;transition:all 0.2s;color:#c9b1ff;font-size:0.95em}
.music-track:hover{background:rgba(255,255,255,0.08);color:#f0e6ff}
.music-track.active{background:rgba(168,85,247,0.25);color:#f0e6ff;font-weight:bold}
.music-menu-divider{height:1px;background:rgba(255,255,255,0.15);margin:10px 0}
.music-menu-custom-header{color:#c9b1ff;font-size:0.8em;opacity:0.7;padding:4px 14px;margin-bottom:4px}
.music-menu-custom-tracks{display:flex;flex-direction:column;gap:6px;max-height:250px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.music-file-choices{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.music-file-choice{flex:1;min-width:0;padding:0;border:none;border-radius:12px;background:rgba(255,255,255,0.06);color:#c9b1ff;font-size:0.85em;cursor:pointer;transition:all 0.2s;text-align:center;overflow:hidden}
.music-file-choice::file-selector-button{width:100%;padding:10px 6px;border:none;border-radius:12px;background:rgba(255,255,255,0.06);color:#c9b1ff;font-size:0.95em;cursor:pointer;transition:all 0.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-file-choice::file-selector-button:hover{background:rgba(255,255,255,0.1);color:#f0e6ff}
.music-file-choice::file-selector-button:active{transform:scale(0.98)}
#music-file-media::file-selector-button{content:'🎵 Медиатека'}
#music-file-files::file-selector-button{content:'📁 Файлы'}
.music-file-choice.disabled{opacity:0.4;pointer-events:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,rgba(40,20,70,0.95),rgba(30,15,55,0.95));color:#f0e6ff;padding:14px 28px;border-radius:16px;font-size:0.9em;z-index:5000;opacity:0;transition:opacity 0.4s cubic-bezier(0.34,1.56,0.64,1),transform 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(168,85,247,0.3);box-shadow:0 8px 32px rgba(168,85,247,0.25),0 0 20px rgba(168,85,247,0.1);white-space:nowrap;display:flex;align-items:center;gap:10px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.music-track .track-delete{margin-left:auto;padding:4px 8px;border:none;background:none;color:#c9b1ff;font-size:0.85em;cursor:pointer;opacity:0;transition:opacity 0.3s}
.music-track:hover .track-delete{opacity:0.7}
.music-track .track-delete:hover{opacity:1;color:#ff9999}
.music-menu-volume{display:flex;align-items:center;gap:8px;padding:8px 14px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:12px}
.music-menu-volume span:first-child{color:#c9b1ff;font-size:0.9em;min-width:70px}
.music-menu-volume span:last-child{color:#f0e6ff;font-size:0.85em;min-width:40px;text-align:right}
#music-volume-slider{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.15);outline:none;touch-action:auto}
#music-volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#7c3aed);cursor:pointer;box-shadow:0 2px 8px rgba(168,85,247,0.4)}
#music-volume-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#7c3aed);cursor:pointer;border:none}
.music-url-import-btn{display:block;width:100%;padding:10px;margin-top:8px;border:none;border-radius:12px;background:rgba(168,85,247,0.15);color:#c9b1ff;font-size:0.9em;cursor:pointer;transition:all 0.2s;text-align:center}
.music-url-import-btn:hover{background:rgba(168,85,247,0.25);color:#f0e6ff}
.url-import-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:3100;display:none;align-items:center;justify-content:center}
.url-import-overlay.show{display:flex}
.url-import-overlay.closing{animation:menuFadeOut 0.2s ease-out forwards}
.url-import-modal{background:linear-gradient(135deg,rgba(40,20,70,0.97),rgba(30,15,55,0.97));border-radius:20px;padding:20px;width:90%;max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);animation:slideUp 0.25s ease-out}
.url-import-modal.closing{animation:slideDown 0.2s ease-out forwards}
.url-import-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.url-import-header span{color:#f0e6ff;font-size:1em;font-weight:bold}
.url-import-close{background:none;border:none;color:#c9b1ff;font-size:1.6em;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.2s;line-height:1}
.url-import-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.url-import-body{display:flex;flex-direction:column;gap:10px}
.url-import-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#f0e6ff;font-size:0.9em;outline:none;transition:border-color 0.2s}
.url-import-input:focus{border-color:rgba(168,85,247,0.5)}
.url-import-input::placeholder{color:rgba(201,177,255,0.4)}
.url-import-load-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:white;font-size:0.95em;font-weight:bold;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(124,58,237,0.3)}
.url-import-load-btn:active{transform:scale(0.97)}
.url-import-load-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.url-import-status{margin-top:10px;min-height:20px;text-align:center;font-size:0.85em;color:#c9b1ff}
.url-import-status.error{color:#ff9999}
.url-import-status.success{color:#a8e6a8}
.url-import-hint{margin-top:8px;color:rgba(201,177,255,0.5);font-size:0.75em;text-align:center}
.delete-confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:3200;display:none;align-items:center;justify-content:center}

var BOARD_SIZE=8;

var currentPieces=[];

var gameOver=false;

try{bestScore=parseInt(localStorage.getItem('bb_best')||'0',10)}catch(e){bestScore=0}

var audioCtx=null;

var TRACKS=[
{name:'Лунная соната',melody:[261.63,293.66,329.63,349.23,392,440,392,349.23,329.63,293.66,261.63,246.94,261.63,293.66,329.63,349.23],bass:[130.81,146.83,164.81,174.61,196,220,196,174.61,164.81,146.83,130.81,123.47,130.81,146.83,164.81,174.61],interval:1100},
{name:'Ночной бриз',melody:[220,261.63,329.63,220,196,246.94,293.66,196,174.61,220,261.63,293.66,220,196,246.94,220],bass:[110,130.81,164.81,110,98,123.47,146.83,98,87.31,110,130.81,146.83,110,98,123.47,110],interval:1400},
{name:'Звёздный дождь',melody:[261.63,329.63,392,523.25,392,329.63,261.63,293.66,349.23,440,523.25,440,349.23,293.66,261.63,329.63],bass:[130.81,164.81,196,261.63,196,164.81,130.81,146.83,174.61,220,261.63,220,174.61,146.83,130.81,164.81],interval:800},
{name:'Тихий сад',melody:[261.63,293.66,329.63,392,440,392,329.63,293.66,261.63,329.63,392,523.25,392,329.63,293.66,261.63],bass:[130.81,146.83,164.81,196,220,196,164.81,146.83,130.81,164.81,196,261.63,196,164.81,146.83,130.81],interval:1200},
{name:'Эфирный хор',melody:[220,196,174.61,164.81,146.83,164.81,174.61,196,220,246.94,220,196,174.61,164.81,146.83,130.81],bass:[110,98,87.31,82.41,73.42,82.41,87.31,98,110,123.47,110,98,87.31,82.41,73.42,65.41],interval:1500,choral:true},
{name:'Ночная природа',interval:2000,nature:true}
];

var customTracks=[];
var customTrackBuffers=[];
var customSourceNode=null;

var MAX_CUSTOM=10;

try{musicVolume=parseInt(localStorage.getItem('bb_music_vol')||'100',10)}catch(e){musicVolume=100}

function getAudioCtx(){
if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){audioCtx=null}}
if(audioCtx&&audioCtx.state==='suspended'){audioCtx.resume().catch(function(){})}
return audioCtx;
}

function playTone(freq,dur,type,vol,delay){
if(!sfxEnabled)return;
var ctx=getAudioCtx();if(!ctx)return;
var t=ctx.currentTime+(delay||0);
try{
var o=ctx.createOscillator(),g=ctx.createGain();
o.type=type||'sine';o.frequency.value=freq;
g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.1,t+0.008);
g.gain.exponentialRampToValueAtTime(0.001,t+dur);
o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);
}catch(e){}
}

function playPlace(){if(!sfxEnabled)return;playTone(523,0.08,'sine',0.08,0);playTone(784,0.06,'sine',0.05,0.04);playTone(1047,0.05,'triangle',0.03,0.08)}
function playClear(){if(!sfxEnabled)return;var f=[523.25,659.25,783.99,1046.5,1318.5];for(var i=0;i<f.length;i++){playTone(f[i],0.25,'sine',0.07,i*0.05);playTone(f[i]*1.5,0.18,'triangle',0.03,i*0.05+0.025)}}
function playCombo(c){if(!sfxEnabled||c<2)return;var n=[523,659,784,1047,1319,1568,2093];var count=Math.min(c+1,n.length);for(var i=0;i<count;i++){playTone(n[i],0.3,'sine',0.08,i*0.07);playTone(n[i]*2,0.2,'triangle',0.04,i*0.07+0.035)}if(c>=4){playTone(2093,0.5,'sine',0.1,0.35);playTone(2637,0.4,'triangle',0.06,0.4)}if(c>=6){for(var j=0;j<5;j++)playTone(3000+j*200,0.15,'sine',0.04,0.5+j*0.05)}}
function playGameOver(){if(!sfxEnabled)return;var f=[440,370,330,294,262];for(var i=0;i<f.length;i++)playTone(f[i],0.45,'sine',0.08,i*0.22)}

function playChoralNote(freq,t,dur){
if(!musicEnabled||!musicGain)return;
var detunes=[-12,-6,0,6,12];
for(var d=0;d<detunes.length;d++){
try{
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='sine';o.frequency.value=freq;o.detune.value=detunes[d];
var vibrato=audioCtx.createOscillator(),vibratoGain=audioCtx.createGain();
vibrato.frequency.value=5.5;vibratoGain.gain.value=8;
vibrato.connect(vibratoGain);vibratoGain.connect(o.frequency);
var attack=dur*0.25,release=dur*0.3;
g.gain.setValueAtTime(0,t);
g.gain.linearRampToValueAtTime(0.025,t+attack);
g.gain.setValueAtTime(0.025,t+dur-release);
g.gain.linearRampToValueAtTime(0,t+dur);
o.connect(g);g.connect(musicGain);
o.start(t);o.stop(t+dur);
vibrato.start(t);vibrato.stop(t+dur);
}catch(e){}
}
}

function startMusic(){
if(!musicEnabled||musicInterval)return;
var ctx=getAudioCtx();if(!ctx)return;
musicGain=ctx.createGain();musicGain.gain.value=0.18*(musicVolume/100);musicGain.connect(ctx.destination);
if(currentTrack>=6){playCustomTrack(currentTrack-6);return}
var track=TRACKS[currentTrack];
if(track.nature){startNatureTrack();return}
var melody=track.melody,bass=track.bass,idx=0;
function play(){
if(!musicEnabled||!musicGain)return;
var m=melody[idx%melody.length],b=bass[idx%bass.length],t=ctx.currentTime;
try{
if(track.choral){
playChoralNote(m,t,track.interval/1000*0.9);
playChoralNote(b*0.5,t,track.interval/1000*0.9);
}else{
var o1=ctx.createOscillator(),g1=ctx.createGain();o1.type='sine';o1.frequency.value=m;
g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(0.12,t+0.12);g1.gain.linearRampToValueAtTime(0.06,t+0.7);g1.gain.linearRampToValueAtTime(0,t+1);
o1.connect(g1);g1.connect(musicGain);o1.start(t);o1.stop(t+1);
var o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';o2.frequency.value=b;
g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.08,t+0.15);g2.gain.linearRampToValueAtTime(0.04,t+0.8);g2.gain.linearRampToValueAtTime(0,t+1);
o2.connect(g2);g2.connect(musicGain);o2.start(t);o2.stop(t+1);
var o3=ctx.createOscillator(),g3=ctx.createGain();o3.type='triangle';o3.frequency.value=m*2;
g3.gain.setValueAtTime(0,t);g3.gain.linearRampToValueAtTime(0.04,t+0.2);g3.gain.linearRampToValueAtTime(0,t+0.7);
o3.connect(g3);g3.connect(musicGain);o3.start(t);o3.stop(t+0.7);
}
}catch(e){}
idx++;
}
play();musicInterval=setInterval(play,track.interval);
}

function startNatureTrack(){
var ctx=getAudioCtx();
var dur=12;
var bufferSize=ctx.sampleRate*dur;
var noiseBuffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
var data=noiseBuffer.getChannelData(0);
for(var i=0;i<bufferSize;i++)data[i]=Math.random()*2-1;
function playWind(){
if(!musicEnabled||!musicGain)return;
var t=ctx.currentTime;
var src=ctx.createBufferSource();src.buffer=noiseBuffer;src.loop=true;
var bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=120;bp.Q.value=0.2;
var g=ctx.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.01,t+3);g.gain.setValueAtTime(0.01,t+dur-3.5);g.gain.linearRampToValueAtTime(0,t+dur);
src.connect(bp);bp.connect(g);g.connect(musicGain);src.start(t);src.stop(t+dur);
var lfo=ctx.createOscillator(),lfoG=ctx.createGain();lfo.frequency.value=0.04;lfoG.gain.value=40;
lfo.connect(lfoG);lfoG.connect(bp.frequency);lfo.start(t);lfo.stop(t+dur);
}

function decodeAudioData(ctx,arrayBuffer,successCb,errorCb){
  try{
    if(typeof ctx.decodeAudioData==='function'){
      var attempt=0;
      function tryDecode(){
        attempt++;
        var bufCopy=arrayBuffer.slice(0);
        try{
          var promise=ctx.decodeAudioData(bufCopy);
          if(promise&&typeof promise.then==='function'){
            promise.then(function(buf){successCb(buf)}).catch(function(){
              if(attempt<3){tryDecode()}else{errorCb()}
            });
            return;
          }
        }catch(e){
          if(attempt<3){tryDecode()}else{errorCb()}
          return;
        }
        try{
          var bufCopy2=arrayBuffer.slice(0);
          ctx.decodeAudioData(bufCopy2,function(buf){successCb(buf)},function(){
            if(attempt<3){tryDecode()}else{errorCb()}
          });
        }catch(e){
          if(attempt<3){tryDecode()}else{errorCb()}
        }
      }
      tryDecode();
    }
  }catch(e){errorCb()}
}

}catch(e){customTrackBuffers[idx]=null;loaded++;

function handleFileSelect(files){

if(remaining<=0){showToast('Максимум '+MAX_CUSTOM+' треков');return}
var processed=0,decoded=0;
function resumeCtxAndDecode(){
ctx.resume().then(function(){
for(var i=0;i<remaining;i++){
(function(file){
if(file.size>20*1024*1024){processed++;showToast('Файл "'+file.name+'" слишком большой');return}
var reader=new FileReader();
reader.onload=function(e){
var ab=e.target.result;
doDecode(ctx,ab,file,function(success){decoded++;processed++;if(processed===remaining&&decoded===0)showToast('Ни один файл не удалось декодировать')});
};
reader.onerror=function(){processed++;showToast('Ошибка чтения "'+file.name+'"');};
reader.readAsArrayBuffer(file);
})(files[i]);
}
}).catch(function(){
showToast('Не удалось активировать аудио');
});
}
if(ctx.state==='suspended'){
resumeCtxAndDecode();
}else{
for(var i=0;i<remaining;i++){
(function(file){
if(file.size>20*1024*1024){processed++;showToast('Файл "'+file.name+'" слишком большой');return}
var reader=new FileReader();
reader.onload=function(e){
var ab=e.target.result;
doDecode(ctx,ab,file,function(success){decoded++;processed++;if(processed===remaining&&decoded===0)showToast('Ни один файл не удалось декодировать')});
};
reader.onerror=function(){processed++;showToast('Ошибка чтения "'+file.name+'"');};
reader.readAsArrayBuffer(file);
})(files[i]);
}
}
}

function doDecode(ctx,ab,file,onAllDone){
  function decodeWithCtx(audioCtx,attempt){
    var bufCopy=ab.slice(0);
    decodeAudioData(audioCtx,bufCopy,function(buf){
      var id='custom_'+Date.now();
      var name=file.name.replace(/\.[^/.]+$/,'');
      customTracks.push({id:id,name:name,data:ab});
      customTrackBuffers.push(buf);
      saveTrackToDB(id,name,ab);
      renderCustomTracks();updateAddButton();
      var newIdx=6+customTracks.length-1;
      currentTrack=newIdx;
      localStorage.setItem('bb_music',String(newIdx));
      stopMusic();if(musicEnabled)startMusic();updateMusicMenuUI();
      if(onAllDone)onAllDone(true);
    },function(){
      if(attempt<3){
        setTimeout(function(){decodeWithCtx(audioCtx,attempt+1)},150);
      }else{
        showToast('"'+file.name+'" — формат не поддерживается');
        if(onAllDone)onAllDone(false);
      }
    });
  }
  decodeWithCtx(ctx,1);
}

function handleUrlImport(url){
  var status=document.getElementById('url-import-status');
  var btn=document.getElementById('url-import-load-btn');
  if(!status||!btn)return;
  try{new URL(url)}catch(e){
    status.textContent='Неверный URL';status.className='url-import-status error';return;
  }
  if(customTracks.length>=MAX_CUSTOM){
    status.textContent='Максимум '+MAX_CUSTOM+' треков';status.className='url-import-status error';return;
  }
  var ctx=getAudioCtx();
  if(!ctx){
    status.textContent='Аудио недоступно';status.className='url-import-status error';return;
  }
  btn.disabled=true;
  status.textContent='Загрузка...';status.className='url-import-status';
  fetch(url)
    .then(function(res){
      if(!res.ok)throw new Error('Ошибка загрузки: '+res.status);
      var cl=res.headers.get('content-length');
      if(cl&&parseInt(cl)>20*1024*1024)throw new Error('Файл слишком большой (>20 МБ)');
      return res.arrayBuffer();
    })
    .then(function(ab){
      status.textContent='Декодирование...';
      var attempt=0;
      function tryDecode(){
        attempt++;
        var bufCopy=ab.slice(0);
        decodeAudioData(ctx,bufCopy,function(buf){
          var id='custom_'+Date.now();
          var name=url.split('/').pop().split('?')[0].replace(/\.[^/.]+$/,'')||'Трек по ссылке';
          if(!name)name='Трек по ссылке';
          customTracks.push({id:id,name:name,data:ab});
          customTrackBuffers.push(buf);
          saveTrackToDB(id,name,ab);
          renderCustomTracks();updateAddButton();
          var newIdx=6+customTracks.length-1;
          currentTrack=newIdx;
          localStorage.setItem('bb_music',String(newIdx));
          stopMusic();if(musicEnabled)startMusic();updateMusicMenuUI();
          status.textContent='Успешно загружено!';status.className='url-import-status success';
          btn.disabled=false;
          setTimeout(closeUrlImport,1000);
        },function(){
          if(attempt<3){
            setTimeout(tryDecode,150);
          }else{
            status.textContent='Формат не поддерживается';status.className='url-import-status error';
            btn.disabled=false;
          }
        });
      }
      tryDecode();
    })
    .catch(function(err){
      status.textContent=err.message||'Ошибка загрузки';status.className='url-import-status error';
      btn.disabled=false;
    });
}

function scoreShapeForCombo(shape){

if(cellCount>=9)score-=20;

for(var row=0;row<BOARD_SIZE;row++){

if(shape[r][c]){
var br=row+r;
if(br>=0&&br<BOARD_SIZE){
if(emptyInRow===cellCount)score+=2000;
else if(emptyInRow<=2)score+=300;
else if(emptyInRow<=4)score+=150;
else score+=80;
}
}
}
}
}
}
for(var col=0;col<BOARD_SIZE;col++){
var emptyInCol=0;
for(var r=0;r<BOARD_SIZE;r++){if(!board[r][col])emptyInCol++}
if(emptyInCol>=1&&emptyInCol<=6){
for(var r=0;r<shape.length;r++){
for(var c=0;c<shape[r].length;c++){
if(shape[r][c]){
var bc=col+c;

else if(emptyInCol<=4)score+=150;

if(r<0.85){
var totalW=0;
for(var i=0;i<valid.length;i++)totalW+=Math.max(1,valid[i].comboScore+valid[i].placements);
var rand=Math.random()*totalW,acc=0;
for(var i=0;i<valid.length;i++){
acc+=Math.max(1,valid[i].comboScore+valid[i].placements);
if(rand<=acc)return valid[i].idx;
}
return valid[valid.length-1].idx;
}else if(r<0.95){
return valid[Math.floor(Math.random()*valid.length)].idx;
}else{
return randShapeIdx();
}
}

function canPlace(shape,row,col){
for(var r=0;r<shape.length;r++){for(var c=0;c<shape[r].length;c++){
if(shape[r][c]){var br=row+r,bc=col+c;if(br<0||br>=BOARD_SIZE||bc<0||bc>=BOARD_SIZE||board[br][bc])return false}
}}return true;
}

function findBestPlacement(shape,targetRow,targetCol){
var best=null,bestDist=Infinity;
for(var r=0;r<BOARD_SIZE;r++){for(var c=0;c<BOARD_SIZE;c++){
if(canPlace(shape,r,c)){
var dr=r-targetRow,dc=c-targetCol;
var dist=dr*dr+dc*dc;
if(dist<bestDist){bestDist=dist;best={row:r,col:c}}
}
}}
return best;
}

function placePiece(shape,color,row,col){
var count=0,placed=[];
for(var r=0;r<shape.length;r++){for(var c=0;c<shape[r].length;c++){
if(shape[r][c]){board[row+r][col+c]=color;count++;placed.push({r:row+r,c:col+c})}
}}
score+=count;playPlace();renderBoard();
for(var i=0;i<placed.length;i++){var cell=document.querySelector('.cell[data-row="'+placed[i].r+'"][data-col="'+placed[i].c+'"]');if(cell)cell.classList.add('placing')}
var lines=clearLines();
if(lines>0){
combo++;
movesWithoutClear=0;
comboResetThreshold=5+Math.floor(Math.random()*4);
var multiplier=combo>=10?100:combo>=3?10:1;
var bonus=lines*10*combo*multiplier;
score+=bonus;
setTimeout(function(){playClear()},80);
if(combo>=2)playCombo(combo);
spawnParticles(lines);showFlash();showComboText(combo);showScorePopup(bonus);
isAnimating=true;
setTimeout(function(){
isAnimating=false;
var allUsed=true;for(var k=0;k<currentPieces.length;k++){if(!currentPieces[k].used){allUsed=false;break}}
if(allUsed)generatePieces();else checkGameOver();
},400);
}else{
movesWithoutClear++;
if(movesWithoutClear>=comboResetThreshold&&comboResetThreshold>0){
combo=0;movesWithoutClear=0;comboResetThreshold=0;
var cd=document.getElementById('combo-display');
cd.classList.remove('active');
}
var allUsed=true;for(var k=0;k<currentPieces.length;k++){if(!currentPieces[k].used){allUsed=false;break}}
if(allUsed)generatePieces();else checkGameOver();
}
document.getElementById('score-display').textContent=score;saveBest();updateBestDisplay();
var cd=document.getElementById('combo-display');if(combo<2)cd.classList.remove('active');
}

function clearLines(){
var rowsToClear=[],colsToClear=[];
for(var r=0;r<BOARD_SIZE;r++){var rowFull=true;for(var c=0;c<BOARD_SIZE;c++){if(!board[r][c]){rowFull=false;break}}if(rowFull)rowsToClear.push(r)}
for(var c=0;c<BOARD_SIZE;c++){var colFull=true;for(var r=0;r<BOARD_SIZE;r++){if(!board[r][c]){colFull=false;break}}if(colFull)colsToClear.push(c)}
var cellsToClear={};
for(var i=0;i<rowsToClear.length;i++){for(var c=0;c<BOARD_SIZE;c++)cellsToClear[rowsToClear[i]+','+c]=true}
for(var i=0;i<colsToClear.length;i++){for(var r=0;r<BOARD_SIZE;r++)cellsToClear[r+','+colsToClear[i]]=true}
var total=rowsToClear.length+colsToClear.length;
if(total>0){
for(var key in cellsToClear){var parts=key.split(',');var cell=document.querySelector('.cell[data-row="'+parts[0]+'"][data-col="'+parts[1]+'"]');if(cell)cell.classList.add('clearing')}
setTimeout(function(){for(var key in cellsToClear){var parts=key.split(',');board[parseInt(parts[0])][parseInt(parts[1])]=null}renderBoard()},400);
}
return total;
}

function getBoardPos(cx,cy){

function onDragEnd(e){

var pt=e.changedTouches?e.changedTouches[0]:e,del=document.getElementById('drag-piece');
var py=pt.clientY-dragOffsetY+del.offsetHeight/2,pos=getBoardPos(pt.clientX,py),shape=draggingPiece.shape;
var sr=pos.row-Math.floor(shape.length/2),sc=pos.col-Math.floor(shape[0].length/2);
var br=getBoardRect();
var nearBoard=(pt.clientX>=br.left-30&&pt.clientX<=br.right+30&&pt.clientY>=br.top-30&&pt.clientY<=br.bottom+30);
if(nearBoard){
var best=findBestPlacement(shape,sr,sc);
if(best){currentPieces[draggingIndex].used=true;var containers=document.querySelectorAll('.piece-container');if(containers[draggingIndex])containers[draggingIndex].classList.add('used');placePiece(shape,draggingPiece.color,best.row,best.col)}
}else if(canPlace(shape,sr,sc)){
currentPieces[draggingIndex].used=true;var containers=document.querySelectorAll('.piece-container');if(containers[draggingIndex])containers[draggingIndex].classList.add('used');placePiece(shape,draggingPiece.color,sr,sc);

}

for(var i=0;i<butterflies.length;i++){butterflies[i].update();butterflies[i].draw()}
for(var i=0;i<petals.length;i++){petals[i].update();petals[i].draw()}
bgAnimFrame=requestAnimationFrame(animBg);
}

var savedMusicOn=localStorage.getItem('bb_music_on');
if(savedMusicOn==='0'){musicEnabled=false;document.getElementById('music-btn').classList.add('muted')}

initDB();
resizeCanvas();animBg();initBoard();generatePieces();updateBestDisplay();
document.addEventListener('touchstart',function(){startMusic()},{once:true});
document.addEventListener('mousedown',function(){startMusic()},{once:true});
document.addEventListener('visibilitychange',function(){
if(document.hidden){if(bgAnimFrame)cancelAnimationFrame(bgAnimFrame)}
else{requestAnimationFrame(animBg)}
});

})();
</script>

  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(err) {

    });
  });
}
